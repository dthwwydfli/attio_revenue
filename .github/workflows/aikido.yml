name: Aikido Security

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]

jobs:
  aikido-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect new vulnerabilities
        if: ${{ secrets.AIKIDO_SECRET_KEY != '' }}
        uses: AikidoSec/github-actions-workflow@v1.0.13
        with:
          secret-key: ${{ secrets.AIKIDO_SECRET_KEY }}
          fail-on-timeout: false
          fail-on-dependency-scan: false
          fail-on-sast-scan: false
          fail-on-iac-scan: false
          minimum-severity: "CRITICAL"
          timeout-seconds: 180
          post-scan-status-comment: "off"
          post-sast-review-comments: "off"
          github-token: ${{ secrets.GITHUB_TOKEN }}
