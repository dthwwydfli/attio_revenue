# Superlinked SIE — optional local fallback only
# Prefer the hackathon GPU cluster via SIE_ENDPOINT in .env (no Docker needed).
# Usage: docker compose -f docker-compose.sie.yml up -d
# Docs: https://github.com/superlinked/sie

services:
  sie:
    image: ghcr.io/superlinked/sie-server:latest-cpu-default
    ports:
      - "8080:8080"
    volumes:
      - sie-hf-cache:/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  sie-hf-cache:
